name: Kartra Authority Daily Build

on:
  schedule:
    # Daily at 5:00 AM UTC
    - cron: "0 5 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kartra-authority-engine
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy Kartra Authority Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Verify Build Files
        run: |
          echo "Repository Contents:"
          ls -la

          if [ ! -f build.py ]; then
            echo "ERROR: build.py not found"
            exit 1
          fi

      - name: Clean Previous Build
        run: |
          rm -rf site

      - name: Run Kartra Authority Engine
        run: |
          python build.py

      - name: Verify Generated Site
        run: |
          echo "Generated Site Contents:"
          ls -la site

          test -f site/index.html
          test -f site/sitemap.xml
          test -f site/robots.txt
          test -f site/llms.txt
          test -f site/404.html

      - name: Configure Git
        run: |
          git config --global user.name "KartraAuthorityBot"
          git config --global user.email "bot@kartraauthority.com"

      - name: Commit Generated Files
        run: |
          git add .

          git diff --cached --quiet && echo "No changes detected" && exit 0

          git commit -m "Kartra Authority Daily Build [$(date +'%Y-%m-%d')]"

      - name: Pull Latest Remote Changes
        run: |
          git pull origin main --rebase

      - name: Push Changes
        run: |
          git push origin main

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-and-deploy
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages Site
        id: deployment
        uses: actions/deploy-pages@v4
